# Custom manifest for Rendezvous fuzzing of covault-core.
# Rendezvous auto-loads Clarinet-<contract>.toml when targeting that contract, so
# `npx rv . covault-core test` initializes simnet from THIS file instead of the
# main Clarinet.toml. It maps covault-core to the instrumented copy
# (security/covault-core.rv.clar = deployed contract + simnet-only property tests),
# leaving contracts/covault-core.clar untouched.
[project]
name = 'covault-fuzz'
description = ''
authors = []
telemetry = false
cache_dir = './.cache'

[[project.requirements]]
contract_id = 'SP3FBR2AGK5H9QBDH3EEN6DF8EK8JY7RX8QJ5SVTE.sip-010-trait-ft-standard'

[[project.requirements]]
contract_id = 'SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-token'

[contracts.covault-core]
path = 'security/covault-core.rv.clar'
clarity_version = 4
epoch = 'latest'

[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
